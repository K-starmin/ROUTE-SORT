<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최적 경로 마스터</title>
    <style>
        /* 모바일 앱처럼 보이게 하는 CSS 스타일링 */
        body { 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            background-color: #f4f5f7; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            justify-content: center; 
        }
        .app-container { 
            background: white; 
            width: 100%; 
            max-width: 400px; /* 모바일 화면 크기에 맞춤 */
            padding: 25px 20px; 
            border-radius: 16px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.05); 
        }
        h2 { text-align: center; color: #111; margin-top: 0; margin-bottom: 25px; }
        
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #555; }
        input[type="text"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #e1e1e1; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 15px;
            outline: none;
        }
        input[type="text"]:focus { border-color: #007aff; }

        .waypoint-list { margin-bottom: 15px; }
        .waypoint-item { display: flex; gap: 8px; margin-bottom: 10px; }
        .waypoint-item input { flex: 1; }
        .btn-remove { 
            background: #ff4d4f; 
            color: white; 
            border: none; 
            width: 45px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
        }

        .btn-add { 
            width: 100%; 
            padding: 14px; 
            background: #fafafa; 
            border: 1px dashed #ccc; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-bottom: 25px; 
            color: #666; 
            font-weight: 600;
        }
        .btn-submit { 
            width: 100%; 
            padding: 16px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2>🚀 최적 경로 마스터</h2>
    
    <div class="input-group">
        <label>출발지</label>
        <input type="text" id="start-point" placeholder="현재 위치 또는 주소 입력">
    </div>

    <div class="waypoint-list" id="waypoint-container">
        <label>방문할 곳들 (경유지)</label>
        <div class="waypoint-item">
            <input type="text" class="waypoint-input" placeholder="목적지 주소나 상호명 입력">
            <button class="btn-remove" onclick="removeWaypoint(this)">X</button>
        </div>
    </div>

    <button class="btn-add" onclick="addWaypoint()">+ 경유지 추가하기</button>
    
    <button class="btn-submit" onclick="calculateRoute()">최적 경로 계산하기</button>
</div>

<script>
<script>
    // 카카오 REST API 키
    const KAKAO_API_KEY = '2cb00c7fd546d28abc34eb785c09c20b';

    // ==========================================
    // 1. 화면 UI 조작 함수 (경유지 추가/삭제) - 기존과 동일
    // ==========================================
    function addWaypoint() {
        const container = document.getElementById('waypoint-container');
        const div = document.createElement('div');
        div.className = 'waypoint-item';
        div.innerHTML = `
            <input type="text" class="waypoint-input" placeholder="목적지 주소나 상호명 입력">
            <button class="btn-remove" onclick="removeWaypoint(this)">X</button>
        `;
        container.appendChild(div);
    }

    function removeWaypoint(button) {
        button.parentElement.remove();
    }

    // ==========================================
    // 2. 카카오 로컬 API를 활용한 데이터 처리 함수 (업그레이드 완료!)
    // ==========================================
    async function getCoordinates(query) {
        if (!query) return null;
        
        // 카카오 키워드 검색 API 주소
        const url = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(query)}`;
        
        try {
            const response = await fetch(url, {
                headers: { 'Authorization': `KakaoAK ${KAKAO_API_KEY}` } // 카카오 출입증 제시
            });
            const data = await response.json();
            
            // 검색 결과가 존재한다면 가장 정확도 높은 첫 번째 결과 반환
            if (data.documents && data.documents.length > 0) {
                return {
                    name: data.documents[0].place_name, // 카카오가 찾아준 정확한 상호명
                    lat: parseFloat(data.documents[0].y), // 위도
                    lng: parseFloat(data.documents[0].x)  // 경도
                };
            }
            return null; // 검색 결과 없음
        } catch (error) {
            console.error("카카오 API 에러:", error);
            return null;
        }
    }
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                  Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                  Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function sortLocations(locations) {
        let startPoint = locations[0]; 
        let unvisited = locations.slice(1); 
        let sortedPath = [startPoint];
        let currentLocation = startPoint;

        while (unvisited.length > 0) {
            let nearestIndex = 0;
            let minDistance = Infinity;

            for (let i = 0; i < unvisited.length; i++) {
                let dist = getDistance(
                    currentLocation.lat, currentLocation.lng,
                    unvisited[i].lat, unvisited[i].lng
                );
                if (dist < minDistance) {
                    minDistance = dist;
                    nearestIndex = i;
                }
            }

            currentLocation = unvisited[nearestIndex];
            sortedPath.push(currentLocation);
            unvisited.splice(nearestIndex, 1);
        }
        return sortedPath;
    }

    // ==========================================
    // 3. 메인 실행 및 화면 출력 함수
    // ==========================================
    async function calculateRoute() {
        const startInput = document.getElementById('start-point').value;
        const waypointInputs = document.querySelectorAll('.waypoint-input'); 
        
        let queries = [startInput];
        waypointInputs.forEach(input => {
            if(input.value.trim() !== "") queries.push(input.value);
        });

        if(queries.length < 2) {
            alert("출발지와 최소 1개 이상의 목적지를 입력해주세요.");
            return;
        }

        const btnSubmit = document.querySelector('.btn-submit');
        btnSubmit.innerText = "경로 계산 중...";
        btnSubmit.disabled = true;
        
        let locations = [];
        for (let i = 0; i < queries.length; i++) {
            const coords = await getCoordinates(queries[i]);
            if (coords) {
                locations.push(coords);
            } else {
                alert(`'${queries[i]}'의 위치를 찾을 수 없습니다.`);
                btnSubmit.innerText = "최적 경로 계산하기";
                btnSubmit.disabled = false;
                return; 
            }
        }

        const optimalPath = sortLocations(locations);
        displayResult(optimalPath);

        btnSubmit.innerText = "최적 경로 계산하기";
        btnSubmit.disabled = false;
    }

// 5. 정렬된 결과를 화면에 예쁘게 보여주고, 내비게이션 버튼을 추가하는 함수
    function displayResult(path) {
        const oldResult = document.getElementById('result-board');
        if(oldResult) oldResult.remove();

        const resultDiv = document.createElement('div');
        resultDiv.id = 'result-board';
        resultDiv.style.marginTop = '25px';
        resultDiv.style.padding = '20px';
        resultDiv.style.background = '#eef2ff';
        resultDiv.style.borderRadius = '12px';
        
        let htmlContent = `<h3 style="margin-top:0; color:#333;">✨ 최적 방문 순서</h3><ol style="padding-left: 20px; line-height: 1.8; color:#444; font-weight:bold;">`;
        
        path.forEach((place, index) => {
            if (index === 0) {
                // 출발지는 버튼 없이 텍스트만 표시
                htmlContent += `<li style="margin-bottom: 10px;">${place.name} <span style="color:#007aff; font-size:13px;">(출발지)</span></li>`;
            } else {
                // 카카오맵 URL Scheme (도착지 좌표 전달)
                const kakaoUrl = `kakaomap://route?ep=${place.lat},${place.lng}&by=CAR`;
                
                // 네이버지도 URL Scheme (도착지 좌표 및 이름 전달)
                const naverUrl = `nmap://route/car?dlat=${place.lat}&dlng=${place.lng}&dname=${encodeURIComponent(place.name)}`;

                // 목적지 이름과 안내 버튼들을 가로로 배치
                htmlContent += `
                    <li style="margin-bottom: 15px;">
                        ${place.name}
                        <div style="margin-top: 6px;">
                            <a href="${kakaoUrl}" style="display:inline-block; padding:8px 14px; background:#FEE500; color:#000000; text-decoration:none; border-radius:8px; font-size:13px; font-weight:900;">카카오 안내</a>
                            <a href="${naverUrl}" style="display:inline-block; margin-left:6px; padding:8px 14px; background:#03C75A; color:#FFFFFF; text-decoration:none; border-radius:8px; font-size:13px; font-weight:900;">네이버 안내</a>
                        </div>
                    </li>
                `;
            }
        });
        
        htmlContent += `</ol>`;
        resultDiv.innerHTML = htmlContent;
        
        const btnSubmit = document.querySelector('.btn-submit');
        btnSubmit.parentNode.insertBefore(resultDiv, btnSubmit);
    }
</script>

</body>
</html>
