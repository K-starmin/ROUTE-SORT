<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>최적 경로 마스터</title>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f4f5f7; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .app-container { background: white; width: 100%; max-width: 400px; padding: 25px 20px; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #111; margin-top: 0; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 14px; color: #555; }
        input[type="text"] { width: 100%; padding: 14px; border: 1px solid #e1e1e1; border-radius: 8px; box-sizing: border-box; font-size: 15px; outline: none; }
        input[type="text"]:focus { border-color: #007aff; }
        .waypoint-list { margin-bottom: 15px; }
        .waypoint-item { display: flex; gap: 8px; margin-bottom: 10px; }
        .waypoint-item input { flex: 1; }
        .btn-remove { background: #ff4d4f; color: white; border: none; width: 45px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-add { width: 100%; padding: 14px; background: #fafafa; border: 1px dashed #ccc; border-radius: 8px; cursor: pointer; margin-bottom: 25px; color: #666; font-weight: 600; }
        .btn-submit { width: 100%; padding: 16px; background: #007aff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3); }
        
        /* 프랜차이즈 검색용 스타일 추가 */
        .franchise-box { background: #f8f9fa; padding: 15px; border-radius: 10px; margin-top: 20px; border: 1px solid #e9ecef; }
        .franchise-box input { margin-bottom: 10px; border-color: #d0bfff; }
        .franchise-box input:focus { border-color: #6A36CE; }
        .btn-franchise { width: 100%; padding: 14px; background: #6A36CE; color: white; border: none; border-radius:8px; font-weight:bold; cursor:pointer; font-size:15px; box-shadow: 0 4px 10px rgba(106, 54, 206, 0.3); }
    </style>
</head>
<body>

<div class="app-container">
    <h2>최적 경로 마스터</h2>
    <div class="input-group">
        <label>출발지</label>
        <input type="text" id="start-point" placeholder="현재 위치 또는 주소 입력">
    </div>
    <div class="waypoint-list" id="waypoint-container">
        <label>방문할 곳들 (경유지)</label>
        <div class="waypoint-item">
            <input type="text" class="waypoint-input" placeholder="목적지 주소나 상호명 입력">
            <button class="btn-remove" onclick="removeWaypoint(this)">X</button>
        </div>
    </div>
    <button class="btn-add" onclick="addWaypoint()">+ 경유지 추가하기</button>
    <button class="btn-submit" onclick="calculateRoute()">최적 경로 계산하기</button>
</div>

<script>
    // ✅ 발급받으신 카카오 REST API 키를 아래 따옴표 안에 넣어주세요!
    const KAKAO_API_KEY = '2cb00c7fd546d28abc34eb785c09c20b';

    let currentOptimalPath = [];

    // --- 1. UI 조작 함수 ---
    function addWaypoint() {
        const container = document.getElementById('waypoint-container');
        const div = document.createElement('div');
        div.className = 'waypoint-item';
        div.innerHTML = `<input type="text" class="waypoint-input" placeholder="목적지 주소나 상호명 입력"><button class="btn-remove" onclick="removeWaypoint(this)">X</button>`;
        container.appendChild(div);
    }
    function removeWaypoint(button) { button.parentElement.remove(); }

    // --- 2. 카카오 로컬 API 데이터 처리 ---
    async function getCoordinates(query) {
        if (!query) return null;
        const url = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(query)}`;
        try {
            const response = await fetch(url, { headers: { 'Authorization': `KakaoAK ${KAKAO_API_KEY}` } });
            const data = await response.json();
            if (data.documents && data.documents.length > 0) {
                return { name: data.documents[0].place_name, lat: parseFloat(data.documents[0].y), lng: parseFloat(data.documents[0].x) };
            }
            return null; 
        } catch (error) { return null; }
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371; 
        const dLat = (lat2 - lat1) * Math.PI / 180;
        const dLon = (lon2 - lon1) * Math.PI / 180;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }

    function sortLocations(locations) {
        let startPoint = locations[0]; 
        let unvisited = locations.slice(1); 
        let sortedPath = [startPoint];
        let currentLocation = startPoint;
        while (unvisited.length > 0) {
            let nearestIndex = 0;
            let minDistance = Infinity;
            for (let i = 0; i < unvisited.length; i++) {
                let dist = getDistance(currentLocation.lat, currentLocation.lng, unvisited[i].lat, unvisited[i].lng);
                if (dist < minDistance) { minDistance = dist; nearestIndex = i; }
            }
            currentLocation = unvisited[nearestIndex];
            sortedPath.push(currentLocation);
            unvisited.splice(nearestIndex, 1);
        }
        return sortedPath;
    }

    // --- 3. 핵심 로직: 원하는 프랜차이즈/가게 최적 위치 찾기 ---
    async function findOptimalFranchise() {
        const searchKeyword = document.getElementById('franchise-input').value.trim();
        if (!searchKeyword) {
            alert("들르고 싶은 가게나 프랜차이즈 이름을 입력해주세요! (예: 스타벅스, 다이소, 주유소)");
            return;
        }

        const btn = document.getElementById('btn-add-franchise');
        btn.innerText = `🔍 주변 '${searchKeyword}' 탐색 중...`;
        btn.disabled = true;

        let candidates = [];
        let seenIds = new Set(); 

        // 경로 상의 각 지점 반경 2km 이내의 사용자가 입력한 검색어 수집 (카테고리 제한 해제)
        for (let node of currentOptimalPath) {
            const url = `https://dapi.kakao.com/v2/local/search/keyword.json?query=${encodeURIComponent(searchKeyword)}&x=${node.lng}&y=${node.lat}&radius=2000`;
            try {
                const res = await fetch(url, { headers: { 'Authorization': `KakaoAK ${KAKAO_API_KEY}` }});
                const data = await res.json();
                if (data.documents) {
                    for (let doc of data.documents) {
                        if (!seenIds.has(doc.id)) {
                            seenIds.add(doc.id);
                            candidates.push({
                                name: doc.place_name,
                                lat: parseFloat(doc.y),
                                lng: parseFloat(doc.x)
                            });
                        }
                    }
                }
            } catch (e) { console.error(e); }
        }

        if (candidates.length === 0) {
            alert(`경로 주변 2km 내에 '${searchKeyword}'을(를) 찾을 수 없습니다.`);
            btn.innerText = "경로 상 최적의 위치 추가";
            btn.disabled = false;
            return;
        }

        // 최적의 삽입 위치 계산
        let bestPlace = null;
        let bestInsertIndex = -1;
        let minDetour = Infinity; 

        for (let place of candidates) {
            for (let i = 0; i < currentOptimalPath.length - 1; i++) {
                let nodeA = currentOptimalPath[i];
                let nodeB = currentOptimalPath[i+1];
                
                let detourCost = getDistance(nodeA.lat, nodeA.lng, place.lat, place.lng) + 
                                 getDistance(place.lat, place.lng, nodeB.lat, nodeB.lng) - 
                                 getDistance(nodeA.lat, nodeA.lng, nodeB.lat, nodeB.lng);
                
                if (detourCost < minDetour) {
                    minDetour = detourCost;
                    bestPlace = place;
                    bestInsertIndex = i + 1; 
                }
            }
            let lastNode = currentOptimalPath[currentOptimalPath.length - 1];
            let appendDetour = getDistance(lastNode.lat, lastNode.lng, place.lat, place.lng);
            if (appendDetour < minDetour) {
                minDetour = appendDetour;
                bestPlace = place;
                bestInsertIndex = currentOptimalPath.length;
            }
        }

        if (bestPlace) {
            bestPlace.name = `${bestPlace.name} (최적 동선 추천)`;
            currentOptimalPath.splice(bestInsertIndex, 0, bestPlace);
            displayResult(currentOptimalPath); 
        }
    }

    // --- 4. 메인 실행 및 화면 출력 ---
    async function calculateRoute() {
        const startInput = document.getElementById('start-point').value;
        const waypointInputs = document.querySelectorAll('.waypoint-input'); 
        let queries = [startInput];
        waypointInputs.forEach(input => { if(input.value.trim() !== "") queries.push(input.value); });

        if(queries.length < 2) { alert("출발지와 최소 1개 이상의 목적지를 입력해주세요."); return; }

        const btnSubmit = document.querySelector('.btn-submit');
        btnSubmit.innerText = "경로 계산 중..."; btnSubmit.disabled = true;
        
        let locations = [];
        for (let i = 0; i < queries.length; i++) {
            const coords = await getCoordinates(queries[i]);
            if (coords) locations.push(coords);
            else { alert(`'${queries[i]}'의 위치를 찾을 수 없습니다.`); btnSubmit.innerText = "최적 경로 계산하기"; btnSubmit.disabled = false; return; }
        }

        currentOptimalPath = sortLocations(locations);
        displayResult(currentOptimalPath);

        btnSubmit.innerText = "최적 경로 계산하기"; btnSubmit.disabled = false;
    }

    function displayResult(path) {
        const oldResult = document.getElementById('result-board');
        if(oldResult) oldResult.remove();

        const resultDiv = document.createElement('div');
        resultDiv.id = 'result-board';
        resultDiv.style.marginTop = '25px';
        resultDiv.style.padding = '20px';
        resultDiv.style.background = '#eef2ff';
        resultDiv.style.borderRadius = '12px';
        
        let htmlContent = `<h3 style="margin-top:0; color:#333;">✨ 최적 방문 순서</h3><ol style="padding-left: 20px; line-height: 1.8; color:#444; font-weight:bold;">`;
        
        path.forEach((place, index) => {
            if (index === 0) {
                htmlContent += `<li style="margin-bottom: 10px;">${place.name} <span style="color:#007aff; font-size:13px;">(출발지)</span></li>`;
            } else {
                const kakaoUrl = `kakaomap://route?ep=${place.lat},${place.lng}&by=CAR`;
                const naverUrl = `nmap://route/car?dlat=${place.lat}&dlng=${place.lng}&dname=${encodeURIComponent(place.name)}`;
                htmlContent += `
                    <li style="margin-bottom: 15px;">
                        ${place.name}
                        <div style="margin-top: 6px;">
                            <a href="${kakaoUrl}" style="display:inline-block; padding:8px 14px; background:#FEE500; color:#000000; text-decoration:none; border-radius:8px; font-size:13px; font-weight:900;">카카오 안내</a>
                            <a href="${naverUrl}" style="display:inline-block; margin-left:6px; padding:8px 14px; background:#03C75A; color:#FFFFFF; text-decoration:none; border-radius:8px; font-size:13px; font-weight:900;">네이버 안내</a>
                        </div>
                    </li>
                `;
            }
        });
        htmlContent += `</ol>`;

        // === 확장된 프랜차이즈 자유 검색 기능 ===
        htmlContent += `
            <div class="franchise-box">
                <label style="font-size:13px; color:#6A36CE; margin-bottom:8px;">가는 길에 들를 곳이 있나요?</label>
                <input type="text" id="franchise-input" placeholder="예: 스타벅스, 다이소, 주유소, 화장실">
                <button id="btn-add-franchise" class="btn-franchise" onclick="findOptimalFranchise()">
                    최적의 위치 추가
                </button>
            </div>
        `;

        resultDiv.innerHTML = htmlContent;
        const btnSubmit = document.querySelector('.btn-submit');
        btnSubmit.parentNode.insertBefore(resultDiv, btnSubmit);
    }
</script>

</body>
</html>
